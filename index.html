<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>PressingBerem</title>
  <style>

    /* ── Les couleurs du site ── */
    body {
      background-color: #FAF6F0;
      font-family: Georgia, serif;
      color: #2C1F1A;
      margin: 0;
      padding: 0;
    }

    /* ── La navigation ── */
    nav {
      background-color: #FAF6F0;
      padding: 20px 60px;
      border-bottom: 1px solid #F2E0D8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav p {
      font-size: 22px;
      font-weight: bold;
      color: #2C1F1A;
      margin: 0;
    }

    nav p span {
      color: #D4897A;
    }

    nav button {
      background-color: #D4897A;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 14px;
      cursor: pointer;
    }

    /* ── La section héro ── */
    section {
      padding: 100px 60px;
    }

    h1 {
      font-size: 64px;
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    h1 span {
      color: #D4897A;
      font-style: italic;
    }

    section p {
      font-size: 16px;
      color: #8A7570;
      margin-bottom: 40px;
      max-width: 500px;
      line-height: 1.8;
    }

    section button {
      background-color: #D4897A;
      color: white;
      border: none;
      padding: 16px 36px;
      border-radius: 30px;
      font-size: 15px;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <!-- LA NAVIGATION -->
  <nav>
    <p>Pressing<span>Berem</span></p>
    <button>Prendre RDV</button>
  </nav>

  <!-- LA PAGE D'ACCUEIL -->
  <section>
    <h1>Ta perruque mérite<br>le <span>meilleur soin</span></h1>
    <p>Premier pressing spécialisé perruques à Bingerville, Abidjan. Collecte et livraison à domicile.</p>
    <button>Réserver maintenant →</button>
  </section>

</body>

</html>
